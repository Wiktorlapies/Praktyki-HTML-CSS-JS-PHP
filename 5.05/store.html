<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Księgarnia</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <header class="head-container">
        <h2 class="page_title">
            Księgarnia
        </h2>
        <nav>
            <a href="index.html">Dostępne książki </a>
            <a href="add_book.html">Dodaj książkę </a>
            <a href="store.html">Magazyn</a>
        </nav>
        <h2 class="subpage_title">Magazyn</h2>
    </header>
    <main>
        <div class="store_container">
            <table class="store">
                <tr>
                    <th class="store_header" colspan="4">Stan magazynu na dzień: <span id="currentDate"></span></th>
                </tr>
                <tr>
                    <th class="bookIdColumn">ID</th>
                    <th class="bookTitleColumn">Tytuł</th>
                    <th class="bookIsbnColumn">ISBN</th>
                    <th class="bookAmountColumn">Ilość</th>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Pro ASP.NET Web API Security</td>
                    <td>978-1-4302-5782-0</td>
                    <td>100</td>
                </tr>
                <tr>
                    <td>4</td>
                    <td>Raspberry Pi IoT Projects</td>
                    <td>978-1-484213-78-0</td>
                    <td>13</td>
                </tr>
                <tr>
                    <td>6</td>
                    <td>Lynn Beighley</td>
                    <td>978-0-596-52684-9</td>
                    <td>54</td>
                </tr>
            </table>
            <div class="store_operations">
                <button class="updateStoreButton operation-button" onclick="window.location.reload()">Aktualizuj</button>
            </div>
        </div>
    </main>
    
    <script>
        document.getElementById("currentDate").textContent = getCurrentDate();
    </script>
</body>
</html>
