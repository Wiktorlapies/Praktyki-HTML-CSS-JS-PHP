<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Księgarnia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="head-container">
        <h2 class="page_title">
            Księgarnia
        </h2>
        <nav>
            <a href="index.html">Dostępne książki </a>
            <a href="add_book.html">Dodaj książkę </a>
            <a href="store.html">Magazyn</a>
        </nav>
        <h2 class="subpage_title">Dodaj książkę</h2>
    </div>
    <main>
        <form action="" method="post">
            <div class="book_data_inputs">
                <label for="bookTitle">Tytuł</label>
                <input type="text" name="bookTitle" id="bookTitle" placeholder="Wpisz tytuł książki"><br>
                <label for="bookAuthor">Autor</label>
                <input type="text" name="bookAuthor" id="bookAuthor" placeholder="Wpisz autora książki"><br>
                <label for="bookPrice">Cena</label>
                <input type="number" step="0.01" name="bookPrice" id="bookPrice" placeholder="Wpisz cenę książki"><br>
                <label for="isbn">ISBN</label>
                <input type="text" name="isbn" id="isbn" placeholder="Wpisz nr ISBN"><br>
                <label for="bookPages">Strony</label>
                <input type="number" name="bookPages" id="bookPages" placeholder="Wpisz ilość stron"><br>
                <label for="bookDescription">Opis</label>
                <textarea name="bookDescription" id="bookDescription" placeholder="Wpisz opis książki"></textarea>
            </div>
            <div class="operations">
                <input type="reset" value="Wyczyść" class="operation-button">
                <input type="submit" value="Dodaj" class="operation-button" onclick="return isDataValid()">
            </div>

        </form>
    </main>
    <script src="script.js"></script>
</body>
</html>
