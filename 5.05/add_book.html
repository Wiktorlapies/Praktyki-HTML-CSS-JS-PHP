<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Księgarnia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="head-container">
        <header class="page_title">
            Księgarnia
        </header>
        <nav>
            <a href="index.html">Dostępne książki </a>
            <a href="add_book.html">Dodaj książkę </a>
            <a href="store.html">Magazyn</a>
        </nav>
        <header class="subpage_title">Dodaj książkę</header>
    </div>
    <main>
        <form action="" method="post">
            <div id="inputs">
                <label for="bookTitle">Tytuł</label>
                <input type="text" name="bookTitle" id="bookTitle" placeholder="Wpisz tytuł książki" required><br>
                <label for="bookAuthor">Autor</label>
                <input type="text" name="bookAuthor" id="bookAuthor" placeholder="Wpisz autora książki" required><br>
                <label for="bookPrice">Cena</label>
                <input type="number" step="0.01" min="0" name="bookPrice" id="bookPrice" placeholder="Wpisz cenę książki" required><br>
                <label for="isbn">ISBN</label>
                <input type="text" name="isbn" id="isbn" placeholder="Wpisz nr ISBN" required><br>
                <label for="bookPages">Strony</label>
                <input type="number" name="bookPages" id="bookPages" placeholder="Wpisz ilość stron" min="0"><br>
                <label for="bookDescription">Opis</label>
                <textarea name="bookDescription" id="bookDescription" placeholder="Wpisz opis książki" maxlength="1000"></textarea>
            </div>
            <div id="operations">
                <input type="reset" value="Wyczyść">
                <input type="submit" value="Dodaj">
            </div>

        </form>
    </main>
</body>
</html>
